# Cloudflare Pages / Workers static site configuration
# https://developers.cloudflare.com/pages/configuration/wrangler-configuration/

name = "sas-huqooqi"
compatibility_date = "2024-01-01"

# Cloudflare Pages: output directory after `pnpm run build`
pages_build_output_dir = "dist"

# Required when Cloudflare runs `wrangler deploy` for a static site (no Worker script)
[assets]
directory = "./dist"
not_found_handling = "404-page"
html_handling = "auto-trailing-slash"

# Build configuration (optional - can also be set in Cloudflare dashboard)
# [build]
# command = "pnpm run build"

# Environment variables for production
# [vars]
# Set these in the Cloudflare Pages dashboard for security

# Custom headers (alternative to _headers file)
# [[headers]]
# for = "/*"
#   [headers.values]
#   X-Frame-Options = "DENY"
#   X-Content-Type-Options = "nosniff"

# Redirects (alternative to _redirects file)
# [[redirects]]
# from = "/"
# to = "/en/"
# status = 302
